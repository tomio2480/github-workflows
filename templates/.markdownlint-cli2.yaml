# markdownlint-cli2 の標準設定
# 各リポジトリのルートにコピーして使用する．
# 個別カスタマイズが必要なリポジトリは，必要なルールのみを上書きする．

config:
  # すべてのルールをデフォルトで有効化
  default: true

  # MD013: line-length
  # 行長は textlint の sentence-length に委ねるため無効化
  MD013: false

  # MD033: no-inline-html
  # はてなブログ互換のため HTML タグを許可
  MD033: false

  # MD041: first-line-heading
  # 最初の見出しが H1 でなくても許容（README 以外のドキュメント用）
  MD041: false

  # MD024: no-duplicate-heading
  # 同一ツリー内での重複は禁止，兄弟ノードでの重複は許可
  MD024:
    siblings_only: true

# lint 対象パターン
globs:
  - "**/*.md"

# lint 対象外パターン
# `templates/.textlintignore` と揃える．micromatch の glob 解釈ではディレクトリ指定に
# `/**` を付けないと配下のファイルが一致しないため，すべて `/**` で末端まで明示する．
# 片方だけにあるとレビュー挙動が齟齬するため，更新時は両ファイルを同時に変更すること．
ignores:
  - "node_modules/**"
  - ".git/**"
  - "dist/**"
  - "build/**"
  - "coverage/**"
  - "CHANGELOG.md"
  # 故意に違反を含むテスト fixture．caller 側 PR レビューにノイズが乗るのを防ぐ．
  # `ignores` は CLI で明示 glob を渡しても適用されるため，自己統合テスト等で
  # fixture を lint したい場合は caller root に override config を置くこと．
  - "tests/fixtures/**"
