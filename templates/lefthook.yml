# lefthook 設定
# pre-push 時に変更対象の Markdown ファイルに lint をかける．
# インストール: npm install -D lefthook && npx lefthook install
# 手動実行:     npx lefthook run pre-push

pre-push:
  parallel: true
  commands:
    markdownlint:
      glob: "*.md"
      # {push_files} は push 対象（リモートとの差分）ファイルに展開される
      run: npx markdownlint-cli2 {push_files}
      skip:
        - merge
        - rebase
    textlint:
      glob: "*.md"
      run: npx textlint {push_files}
      skip:
        - merge
        - rebase

# pre-commit でも走らせたい場合は以下のブロックのコメントを外す
