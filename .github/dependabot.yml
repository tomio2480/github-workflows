version: 2

# GitHub Actions の依存（composite action 内の third-party action）を週次で更新する．
# SHA ピンしているアクションも Dependabot が自動で PR を起票する．
#
# 更新 PR は手動レビューのうえマージする．第三者アクションの挙動変化に注意．

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
