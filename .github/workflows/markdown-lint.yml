name: Markdown Lint (reusable)

# 呼び出し側リポジトリから workflow_call で呼び出される再利用可能ワークフロー．
# reviewdog で PR にインラインコメントを投稿する Bot 型レビューを提供する．
#
# 設計のポイント：
#   - 呼び出し側に設定ファイルが無ければ本リポジトリの templates/ を使う
#   - 呼び出し側に同名ファイルがあればそちらを優先する（ファイル全置換方式の override）
#   - 本リポジトリがどこにあるか（オーナー名・ref）は github.workflow_ref から自動検出
#     するためフォークしても再利用可能ワークフロー本体の変更は不要
#   - third-party action は commit SHA でピンして供給網攻撃を防ぐ

on:
  workflow_call:
    inputs:
      node-version:
        description: "利用する Node.js のバージョン（デフォルトは Active LTS）"
        type: string
        default: "24"
      markdown-glob:
        description: "lint 対象の glob パターン"
        type: string
        default: "**/*.md"
      central-ref:
        description: "設定取得用に checkout する本リポジトリの ref．未指定なら github.workflow_ref から検出"
        type: string
        default: ""
      filter-mode:
        description: "reviewdog のフィルタモード（added / diff_context / file / nofilter）"
        type: string
        default: "added"
      level:
        description: "reviewdog のレベル（info / warning / error）"
        type: string
        default: "warning"
      fail-on-error:
        description: "lint 指摘で job を失敗させるか．false なら指摘では失敗しない（checkout/setup 等の実行エラーは通常どおり失敗）"
        type: boolean
        default: false

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout caller repository
        # actions/checkout v4.3.0
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Detect self repository and ref
        id: self
        shell: bash
        env:
          # GitHub Actions 公式推奨のスクリプトインジェクション対策：
          # run 内で ${{ ... }} を直接展開せず env 経由で受ける
          WORKFLOW_REF: ${{ github.workflow_ref }}
          INPUT_REF: ${{ inputs.central-ref }}
        run: |
          set -euo pipefail
          # github.workflow_ref の形式: OWNER/REPO/PATH@REF
          # 例: tomio2480/github-workflows/.github/workflows/markdown-lint.yml@refs/heads/main
          # 末尾 @REF を落として OWNER/REPO/PATH を取り出し，先頭 2 階層を結合
          SELF_PATH="${WORKFLOW_REF%@*}"
          SELF_REPO="$(printf '%s' "${SELF_PATH}" | awk -F'/' '{print $1"/"$2}')"
          # 最後の @ 以降のみ抽出（@ が複数あっても頑健）
          DETECTED_REF="${WORKFLOW_REF##*@}"
          # 入力で上書きされていればそちらを採用
          if [ -n "${INPUT_REF}" ]; then
            USE_REF="${INPUT_REF}"
          else
            USE_REF="${DETECTED_REF}"
          fi
          echo "repo=${SELF_REPO}" >> "${GITHUB_OUTPUT}"
          echo "ref=${USE_REF}" >> "${GITHUB_OUTPUT}"
          echo "Detected self repo: ${SELF_REPO}"
          echo "Using ref: ${USE_REF}"

      - name: Checkout central configs
        # actions/checkout v4.3.0
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ steps.self.outputs.repo }}
          ref: ${{ steps.self.outputs.ref }}
          path: .central-workflows

      - name: Resolve config file paths
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          resolve() {
            local name="$1"
            if [ -f "${name}" ]; then
              echo "${name}"
            else
              echo ".central-workflows/templates/${name}"
            fi
          }
          MDLINT_CFG="$(resolve .markdownlint-cli2.yaml)"
          TEXTLINT_CFG="$(resolve .textlintrc.json)"
          PRH_CFG="$(resolve prh.yml)"
          echo "mdlint=${MDLINT_CFG}" >> "${GITHUB_OUTPUT}"
          echo "textlint=${TEXTLINT_CFG}" >> "${GITHUB_OUTPUT}"
          echo "prh=${PRH_CFG}" >> "${GITHUB_OUTPUT}"
          echo "markdownlint config: ${MDLINT_CFG}"
          echo "textlint config:     ${TEXTLINT_CFG}"
          echo "prh dictionary:      ${PRH_CFG}"

      - name: Generate runtime textlint config with resolved prh path
        id: textlint_runtime
        shell: bash
        env:
          SRC: ${{ steps.cfg.outputs.textlint }}
          PRH: ${{ steps.cfg.outputs.prh }}
        run: |
          set -euo pipefail
          # textlint config 内の rules.prh.rulePaths を解決済みの prh.yml の絶対パスに差し替える．
          # caller が prh を意図的に無効化（false）または未定義にしている場合はそちらを尊重する．
          DEST=".textlintrc.runtime.json"
          python - "$SRC" "$PRH" "$DEST" <<'PYEOF'
          import json, sys, pathlib
          src, prh, dest = sys.argv[1], sys.argv[2], sys.argv[3]
          cfg = json.loads(pathlib.Path(src).read_text(encoding="utf-8"))
          rules = cfg.get("rules", {})
          if not isinstance(rules, dict):
              raise TypeError("textlint config 'rules' must be an object")
          prh_rule = rules.get("prh")
          if isinstance(prh_rule, dict):
              prh_rule["rulePaths"] = [str(pathlib.Path(prh).resolve())]
          elif prh_rule is None or prh_rule is False:
              # caller が prh を未定義または false（無効化）にしている場合はそのまま尊重する
              pass
          else:
              raise TypeError("textlint config 'rules.prh' must be an object or false")
          pathlib.Path(dest).write_text(
              json.dumps(cfg, ensure_ascii=False, indent=2), encoding="utf-8"
          )
          PYEOF
          echo "config=${DEST}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node.js
        # actions/setup-node v4.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ inputs.node-version }}

      - name: Run markdownlint with reviewdog
        # reviewdog/action-markdownlint v0.26.2
        uses: reviewdog/action-markdownlint@3667398db9118d7e78f7a63d10e26ce454ba5f58
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: ${{ inputs.level }}
          # fail_on_error は v0.26.0 で deprecated．boolean 入力を fail_level の文字列にマップする
          fail_level: ${{ inputs.fail-on-error && 'error' || 'none' }}
          filter_mode: ${{ inputs.filter-mode }}
          markdownlint_flags: "--config ${{ steps.cfg.outputs.mdlint }} \"${{ inputs.markdown-glob }}\" \"#node_modules\""

      - name: Setup reviewdog
        # reviewdog/action-setup v1.5.0
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f
        with:
          reviewdog_version: latest

      - name: Install textlint and rule packages (isolated in tmpdir)
        # tsuyoshicho/action-textlint は textlint_package 入力を持たず caller の
        # package.json に依存するため，drop-in 設計では使用できない．
        # 一時ディレクトリで install することで caller の node_modules / package.json を汚染しない．
        id: textlint_install
        shell: bash
        run: |
          set -euo pipefail
          TMP="$(mktemp -d)"
          (cd "${TMP}" && npm install --no-save --no-package-lock \
            textlint \
            textlint-rule-preset-ja-technical-writing \
            textlint-rule-preset-ja-spacing \
            textlint-rule-prh)
          echo "bin=${TMP}/node_modules/.bin" >> "${GITHUB_OUTPUT}"
          echo "Installed under: ${TMP}"

      - name: Run textlint with reviewdog
        shell: bash
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEXTLINT_CONFIG: ${{ steps.textlint_runtime.outputs.config }}
          MARKDOWN_GLOB: ${{ inputs.markdown-glob }}
          RD_LEVEL: ${{ inputs.level }}
          RD_FILTER_MODE: ${{ inputs.filter-mode }}
          RD_FAIL_ON_ERROR: ${{ inputs.fail-on-error }}
          TEXTLINT_BIN: ${{ steps.textlint_install.outputs.bin }}
        run: |
          set -euo pipefail
          # tmpdir に install した textlint を PATH 先頭で使う．caller の node_modules は参照しない．
          export PATH="${TEXTLINT_BIN}:${PATH}"
          # textlint は非ゼロ終了で指摘を出すため `|| true` で吸収し，checkstyle 出力を reviewdog に渡す
          textlint -f checkstyle --config "${TEXTLINT_CONFIG}" "${MARKDOWN_GLOB}" > textlint-report.xml || true
          reviewdog \
            -f=checkstyle \
            -name="textlint" \
            -reporter=github-pr-review \
            -level="${RD_LEVEL}" \
            -fail-on-error="${RD_FAIL_ON_ERROR}" \
            -filter-mode="${RD_FILTER_MODE}" \
            < textlint-report.xml
