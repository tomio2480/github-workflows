name: Self test (composite action)

# composite action の TDD 検証用 CI workflow．
#
# 3 jobs:
#   - unit-python: scripts/*.py の pytest
#   - unit-bash: scripts/*.sh の bats
#   - integration-action: ./.github/actions/markdown-lint を fixture に対して走らせる
#
# integration-action は reviewdog で PR inline コメントを投稿するため pull_request のみで動く．
# 「指摘ゼロ」 ケースは scripts/count-lint-findings.py の pytest と
# scripts/post-lint-summary.sh の bats で網羅し，self-PR では「指摘あり混在」
# fixture に対する upsert 挙動だけを目視確認する（同一 PR で複数 job が
# 同じ marker を upsert すると race するため，integration は単一 job に
# 絞る）．

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-python:
    name: Python script unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v4.3.0
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        # actions/setup-python v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.x"

      - name: Install pytest
        run: pip install -r tests/python/requirements.txt

      - name: Run pytest
        run: python -m pytest tests/python -v

  unit-bash:
    name: Bash script unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout v4.3.0
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats
        run: bats tests/bash

  integration-action:
    name: Composite action integration on fixtures
    runs-on: ubuntu-latest
    needs:
      - unit-python
      - unit-bash
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        # actions/checkout v4.3.0
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run composite action against fixtures
        # self-test は fixture に対する lint を確認することが目的．caller-style の
        # md-lint.yml と同一 PR で並走したときに summary marker を奪い合わない
        # よう post-summary は false に切る．
        uses: ./.github/actions/markdown-lint
        with:
          markdown-glob: "tests/fixtures/markdown/**/*.md"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-error: "false"
          post-summary: "false"